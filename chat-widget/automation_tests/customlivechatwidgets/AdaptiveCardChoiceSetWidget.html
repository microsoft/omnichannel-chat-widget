<body style="margin: 0">
  <script>
    function lcw() {
      return {
        styleProps: {
          generalStyles: {
            width: "360px",
            height: "560px",
            bottom: "20px",
            right: "20px"
          }
        },
        chatButtonProps: {
          styleProps: {
            generalStyleProps: {
              position: "absolute"
            }
          }
        },
        mock: {
          type: "designer",
          mockMessages: [
            {
              text: "Please select your transit pass type:",
              type: "message",
              attachments: [
                {
                  contentType: "application/vnd.microsoft.card.adaptive",
                  content: {
                    type: "AdaptiveCard",
                    version: "1.3",
                    body: [
                      {
                        type: "TextBlock",
                        text: "Type of Transit Passes",
                        weight: "Bolder",
                        size: "Medium"
                      },
                      {
                        type: "Input.ChoiceSet",
                        id: "transitPassType",
                        label: "Type of Transit Passes",
                        style: "expanded",
                        isMultiSelect: false,
                        choices: [
                          { title: "Monthly Pass", value: "monthly" },
                          { title: "Weekly Pass", value: "weekly" },
                          { title: "Day Pass", value: "day" }
                        ]
                      }
                    ],
                    actions: [
                      {
                        type: "Action.Submit",
                        title: "Submit"
                      }
                    ]
                  }
                }
              ]
            }
          ]
        }
      }
    }

    function setData(key, data, type) {
      try {
        if (type === "localStorage") {
          localStorage.setItem(key, data);
        } else {
          sessionStorage.setItem(key, data);
        }
      } catch (error) {
        console.error("logging to first party failed!")
      }
    }

    function getData(key, type) {
      if (type == "localStorage") {
        return localStorage.getItem(key);
      } else {
        return sessionStorage.getItem(key);
      }
    }
  </script>
