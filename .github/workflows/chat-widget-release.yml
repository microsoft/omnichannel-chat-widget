permissions:
  contents: read    # For checkout
  actions: read     # For downloading artifacts between jobs

name: chat-widget-release

on:
  push:
    tags:
      - 'w-v*'
    paths:
      - 'chat-widget/**'

jobs:
  build:
    if: github.repository == 'microsoft/omnichannel-chat-widget'
    runs-on: windows-2022
    steps:
      - name: Checking out for ${{ github.ref }}
        uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.X
      - name: Update package version
        working-directory: chat-widget
        run: npx version-from-git --no-git-tag-version
        if: ${{ startsWith(github.ref, 'refs/heads/') }}
      - name: Read package.json
        id: read-package-json
        working-directory: chat-widget
        run: |
          echo "::set-output name=name::$(cat package.json | jq -r '.name')"
          echo "::set-output name=version::$(cat package.json | jq -r '.version')"
      - name: Install packages
        working-directory: chat-widget
        run: yarn install --network-timeout 100000
      - name: Unit Tests
        working-directory: chat-widget
        run: yarn test:unit
      - name: Build Storybook
        working-directory: chat-widget
        env :
          NODE_OPTIONS: --openssl-legacy-provider
        run: yarn build-storybook
      - name: VRT Tests
        working-directory: chat-widget
        run: yarn test:visual
      - name: Upload VRT Tests failures screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: VRT Failure Screenshots
          path: 'chat-widget/**/__diff_output__/*.png'
      - name: Build package
        working-directory: chat-widget
        run: yarn build
      - name: Npm packaging
        working-directory: chat-widget
        run: npm pack
      - name: Move package tarball to root
        working-directory: chat-widget
        run: |
          mv *.tgz ../
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: '*.tgz'

