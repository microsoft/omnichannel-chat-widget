name: npm Release

on:
  push:
    branches:
      - main
    tags:
      - 'w-v*'
      - 'c-v*'
  workflow_dispatch:
    inputs:
      package:
        type: choice
        description: Which package to publish
        options:
          - chat-widget
          - chat-components

permissions:
  contents: read
  id-token: write

jobs:
  publish-chat-widget:
    if: ${{ startsWith(github.ref, 'refs/tags/w-v') || startsWith(github.ref, 'refs/heads/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.package == 'chat-widget') }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf true

      - name: Checking out for ${{ github.ref }}
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Update package version from git
        if: ${{ startsWith(github.ref, 'refs/heads/') }}
        working-directory: chat-widget
        run: npx version-from-git --no-git-tag-version

      - name: Read package.json
        id: read-package-json
        run: |
          echo "name=$(jq -r '.name' chat-widget/package.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version' chat-widget/package.json)" >> "$GITHUB_OUTPUT"

      - name: Install packages
        working-directory: chat-widget
        run: yarn install --network-timeout 100000

      - name: Build
        working-directory: chat-widget
        run: yarn build

      - name: Publish ${{ steps.read-package-json.outputs.name }}@${{ steps.read-package-json.outputs.version }}
        working-directory: chat-widget
        run: npm publish --provenance --tag latest --access public

  publish-chat-components:
    if: ${{ startsWith(github.ref, 'refs/tags/c-v') || startsWith(github.ref, 'refs/heads/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.package == 'chat-components') }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf true

      - name: Checking out for ${{ github.ref }}
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Update package version from git
        if: ${{ startsWith(github.ref, 'refs/heads/') }}
        working-directory: chat-components
        run: npx version-from-git --no-git-tag-version

      - name: Read package.json
        id: read-package-json
        run: |
          echo "name=$(jq -r '.name' chat-components/package.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version' chat-components/package.json)" >> "$GITHUB_OUTPUT"

      - name: Install packages
        working-directory: chat-components
        run: yarn install --network-timeout 100000

      - name: Build
        working-directory: chat-components
        run: yarn build

      - name: Publish ${{ steps.read-package-json.outputs.name }}@${{ steps.read-package-json.outputs.version }}
        working-directory: chat-components
        run: npm publish --provenance --tag latest --access public
