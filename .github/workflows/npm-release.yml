name: npm Release

on:
  push:
    branches:
      - main
      - 'hotfix/**'
    tags:
      - 'w-v*'
      - 'c-v*'
  workflow_dispatch:
    inputs:
      package:
        type: choice
        description: Which package to publish
        options:
          - chat-widget
          - chat-components

permissions:
  contents: read
  id-token: write

jobs:
  publish-chat-widget:
    if: ${{ github.repository == 'microsoft/omnichannel-chat-widget' && (startsWith(github.ref, 'refs/tags/w-v') || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/hotfix/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.package == 'chat-widget')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf true

      - name: Checking out for ${{ github.ref }}
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.12.1

      - name: Update package version from git
        if: ${{ github.ref == 'refs/heads/main' }}
        working-directory: chat-widget
        run: npx version-from-git --no-git-tag-version

      - name: Read package.json
        id: read-package-json
        run: |
          echo "name=$(jq -r '.name' chat-widget/package.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version' chat-widget/package.json)" >> "$GITHUB_OUTPUT"

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          if [[ "${{ github.ref }}" == refs/heads/hotfix/* ]]; then
            echo "tag=hotfix" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Install packages
        working-directory: chat-widget
        run: yarn install --network-timeout 100000

      - name: Build
        working-directory: chat-widget
        run: yarn build

      - name: Publish ${{ steps.read-package-json.outputs.name }}@${{ steps.read-package-json.outputs.version }}
        working-directory: chat-widget
        run: npm publish --provenance --tag ${{ steps.dist-tag.outputs.tag }} --access public

  publish-chat-components:
    if: ${{ github.repository == 'microsoft/omnichannel-chat-widget' && (startsWith(github.ref, 'refs/tags/c-v') || github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.package == 'chat-components')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf true

      - name: Checking out for ${{ github.ref }}
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.12.1

      - name: Update package version from git
        if: ${{ github.ref == 'refs/heads/main' }}
        working-directory: chat-components
        run: npx version-from-git --no-git-tag-version

      - name: Read package.json
        id: read-package-json
        run: |
          echo "name=$(jq -r '.name' chat-components/package.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version' chat-components/package.json)" >> "$GITHUB_OUTPUT"

      - name: Install packages
        working-directory: chat-components
        run: yarn install --network-timeout 100000

      - name: Build
        working-directory: chat-components
        run: yarn build

      - name: Publish ${{ steps.read-package-json.outputs.name }}@${{ steps.read-package-json.outputs.version }}
        working-directory: chat-components
        run: npm publish --provenance --tag latest --access public
